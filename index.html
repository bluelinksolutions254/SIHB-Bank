    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #f0f0f5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #dc2626, #ef4444);
            border-radius: 10px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .text-gradient {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 50%, #f87171 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-glow {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #fca5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(220, 38, 38, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            box-shadow: 0 4px 40px rgba(220, 38, 38, 0.25);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: inherit;
        }
        .btn-primary:hover::before {
            opacity: 1;
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 60px rgba(220, 38, 38, 0.4);
        }
        .btn-primary span {
            position: relative;
            z-index: 1;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            color: #ccc;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            color: #fff;
        }
        .btn-google-play {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 14px;
        }
        .btn-google-play:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        .btn-google-play svg {
            width: 28px;
            height: 28px;
        }
        .scroll-reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform, opacity;
        }
        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .scroll-reveal-scale {
            opacity: 0;
            transform: scale(0.92) translateY(20px);
            transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform, opacity;
        }
        .scroll-reveal-scale.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .bg-gradient-animated {
            background: radial-gradient(ellipse at 20% 50%, rgba(220, 38, 38, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(239, 68, 68, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(248, 113, 113, 0.03) 0%, transparent 50%),
                #0a0a0a;
        }
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            will-change: transform;
        }
        .glow-orb-1 {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -100px;
            background: #dc2626;
            animation: orb-float 25s ease-in-out infinite alternate;
        }
        .glow-orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            background: #ef4444;
            animation: orb-float 30s ease-in-out infinite alternate-reverse;
        }
        .glow-orb-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f87171;
            animation: orb-float 20s ease-in-out infinite alternate;
            opacity: 0.06;
        }
        @keyframes orb-float {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(60px, -40px) scale(1.1);
            }
            66% {
                transform: translate(-30px, 50px) scale(0.9);
            }
            100% {
                transform: translate(40px, -20px) scale(1.05);
            }
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .feature-card:hover {
            border-color: rgba(220, 38, 38, 0.2);
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(220, 38, 38, 0.06);
        }
        .feature-card .icon-wrap {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }
        .feature-card:hover .icon-wrap {
            background: rgba(220, 38, 38, 0.16);
            border-color: rgba(220, 38, 38, 0.25);
            transform: scale(1.05);
        }
        .badge-red {
            background: rgba(220, 38, 38, 0.12);
            color: #f87171;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .progress-ring {
            transition: stroke-dashoffset 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .faq-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .faq-item:last-child {
            border-bottom: none;
        }
        .faq-question {
            cursor: pointer;
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            user-select: none;
        }
        .faq-question:hover {
            color: #ef4444;
        }
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease, padding 0.5s ease;
            opacity: 0;
            padding: 0;
        }
        .faq-answer.open {
            max-height: 300px;
            opacity: 1;
            padding: 0 0 24px 0;
        }
        .faq-icon {
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            flex-shrink: 0;
            margin-left: 16px;
        }
        .faq-icon.open {
            transform: rotate(180deg);
        }
        .instrument-tag {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            cursor: default;
        }
        .instrument-tag:hover {
            border-color: rgba(220, 38, 38, 0.3);
            color: #fff;
            background: rgba(220, 38, 38, 0.06);
        }
        .credit-progress {
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .credit-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #dc2626, #ef4444);
            border-radius: 4px;
            transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0%;
        }
        .reminder-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 16px 18px;
            transition: all 0.3s ease;
        }
        .reminder-item:hover {
            border-color: rgba(220, 38, 38, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }
        .reminder-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.green {
            background: #34d399;
        }
        .status-dot.yellow {
            background: #f59e0b;
        }
        .status-dot.red {
            background: #ef4444;
        }
        .status-dot.gray {
            background: rgba(255, 255, 255, 0.15);
        }
        .device-mockup {
            perspective: 1200px;
            transform-style: preserve-3d;
        }
        .device-mockup-inner {
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }
        .phone-reflection {
            transition: none;
        }
        .animate-slide-up {
            animation: slide-up 0.5s ease-out forwards;
        }
        @keyframes slide-up {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-ring {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.04);
            border-top-color: #dc2626;
            border-right-color: #ef4444;
            animation: spin 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            will-change: transform;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loader-text {
            margin-top: 24px;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #0d0d1a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .modal-overlay.open .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-content::-webkit-scrollbar {
            width: 3px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #dc2626;
            border-radius: 10px;
        }
        input,
        select,
        textarea {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(220, 38, 38, 0.4);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
        }
        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(13, 13, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 28px;
            color: #fff;
            font-size: 14px;
            z-index: 9998;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast .toast-icon {
            display: inline-block;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .glow-orb-1 {
                width: 300px;
                height: 300px;
            }
            .glow-orb-2 {
                width: 250px;
                height: 250px;
            }
            .modal-content {
                padding: 24px;
            }
            .device-mockup-inner {
                transform: scale(0.8);
            }
        }
        @media (max-width: 480px) {
            .modal-content {
                padding: 18px;
            }
            .device-mockup-inner {
                transform: scale(0.6);
            }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-ring"></div>
        <div class="loader-text">SIHB BANK</div>
    </div>
    <div id="root"></div>

    <script>
        setTimeout(function() {
            var ls = document.getElementById('loading-screen');
            if (ls) ls.classList.add('hidden');
        }, 2500);
    </script>

            // ─── Stats ──────────────────────────────────────────────────────────
            useEffect(() => {
                const targetStats = { users: 28473, countries: 94, transfers: 125000 };
                const duration = 2000;
                const start = Date.now();
                const animate = () => {
                    const progress = Math.min((Date.now() - start) / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    setStats({
                        users: Math.round(eased * targetStats.users),
                        countries: Math.round(eased * targetStats.countries),
                        transfers: Math.round(eased * targetStats.transfers)
                    });
                    if (progress < 1) requestAnimationFrame(animate);
                    else setStats(targetStats);
                };
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) { animate();
                        observer.disconnect(); }
                }, { threshold: 0.3 });
                if (statsRef.current) observer.observe(statsRef.current);
                return () => observer.disconnect();
            }, []);

            // ─── Three.js ──────────────────────────────────────────────────────
            useEffect(() => {
                if (!threeContainer.current) return;
                const container = threeContainer.current;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 30;
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setClearColor(0x000000, 0);
                container.appendChild(renderer.domElement);
                const particlesGeo = new THREE.BufferGeometry();
                const count = 350;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 80;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 80;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 40 - 10;
                    const color = new THREE.Color();
                    color.setHSL(0.0 + Math.random() * 0.03, 0.9, 0.5 + Math.random() * 0.3);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }
                particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                const particlesMat = new THREE.PointsMaterial({
                    size: 0.12,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.5,
                    blending: THREE.AdditiveBlending,
                    sizeAttenuation: true,
                });
                const particles = new THREE.Points(particlesGeo, particlesMat);
                scene.add(particles);
                let mouseX3 = 0,
                    mouseY3 = 0;
                const handleMouse = (e) => {
                    mouseX3 = (e.clientX / window.innerWidth - 0.5) * 2;
                    mouseY3 = (e.clientY / window.innerHeight - 0.5) * 2;
                };
                window.addEventListener('mousemove', handleMouse);

                function animate() {
                    requestAnimationFrame(animate);
                    particles.rotation.x += (mouseY3 * 0.02 - particles.rotation.x) * 0.02;
                    particles.rotation.y += (mouseX3 * 0.02 - particles.rotation.y) * 0.02;
                    renderer.render(scene, camera);
                }
                animate();
                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    window.removeEventListener('mousemove', handleMouse);
                    window.removeEventListener('resize', handleResize);
                    container.removeChild(renderer.domElement);
                    renderer.dispose();
                };
            }, []);

            // ─── GSAP ──────────────────────────────────────────────────────────

                    const clamp = (v) => Math.max(-0.8, Math.min(0.8, v));
                    mouseX.current = clamp(x * 1.8);
                    mouseY.current = clamp(y * 1.8);
                };
                window.addEventListener('mousemove', handleMouseMove);
                const SENSITIVITY_X = -14,
                    SENSITIVITY_Y = 16,
                    DAMPING = 0.18,
                    DEAD_ZONE = 0.002;
                const updatePhone = () => {
                    const rawX = mouseX.current,
                        rawY = mouseY.current;
                    const deadX = Math.abs(rawX) < DEAD_ZONE ? 0 : rawX;
                    const deadY = Math.abs(rawY) < DEAD_ZONE ? 0 : rawY;
                    targetRotX.current += (deadY * SENSITIVITY_X - targetRotX.current) * DAMPING;
                    targetRotY.current += (deadX * SENSITIVITY_Y - targetRotY.current) * DAMPING;
                    if (phoneInnerRef.current) {
                        phoneInnerRef.current.style.transform =

                    }
                    if (reflectionRef.current) {

                            ry = 0.5 + targetRotX.current * 0.012;

                        reflectionRef.current.style.background =

                    rafId.current = requestAnimationFrame(updatePhone);

                        ease: "sine.inOut",

                return () => {

                    <div className={`modal-overlay ${modalOpen === 'escrow' ? 'open' : ''}`} onClick={closeModal}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-white font-bold text-lg">🏦 Open Escrow Account</h3>
                                <button onClick={closeModal} className="text-white/30 hover:text-white">
                                    <Icons.X className="w-5 h-5" />
                                </button>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault();
                                closeModal();
                                showToast('Escrow account created!', '🏦'); }}>
                                <div className="form-group">
                                    <label>Account Name</label>
                                    <input type="text" name="escrowName" placeholder="e.g. TechCorp Ltd" onChange={handleFormChange} required />
                                </div>
                                <div className="form-group">
                                    <label>Initial Deposit (KES)</label>
                                    <input type="number" name="escrowBalance" placeholder="e.g. 100000" onChange={handleFormChange} required />
                                </div>
                                <div className="form-group">
                                    <label>Purpose</label>
                                    <select name="escrowPurpose" onChange={handleFormChange}>
                                        <option value="property">Property Purchase</option>
                                        <option value="trade">Trade / Import</option>
                                        <option value="services">Services Payment</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <button type="submit" className="btn-primary w-full py-3 rounded-full text-white font-semibold text-sm">
                                    <span>Create Escrow Account</span>
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Instrument Modal */}
                    <div className={`modal-overlay ${modalOpen === 'instrument' ? 'open' : ''}`} onClick={closeModal}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-white font-bold text-lg">📄 Request Bank Instrument</h3>
                                <button onClick={closeModal} className="text-white/30 hover:text-white">
                                    <Icons.X className="w-5 h-5" />
                                </button>
                            </div>
                            <form onSubmit={handleInstrumentRequest}>
                                <div className="form-group">
                                    <label>Instrument Type</label>
                                    <select name="instrumentType" onChange={handleFormChange} required>
                                        <option value="LC">Letter of Credit (LC)</option>
                                        <option value="BG">Bank Guarantee (BG)</option>
                                        <option value="SBLC">Standby LC (SBLC)</option>
                                        <option value="DLC">Documentary LC (DLC)</option>
                                        <option value="PoF">Proof of Funds (PoF)</option>
                                        <option value="PoP">Proof of Payment (PoP)</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Amount (USD)</label>
                                    <input type="text" name="instrumentAmount" placeholder="e.g. USD 50,000" onChange={handleFormChange} required />
                                </div>
                                <div className="form-group">
                                    <label>Beneficiary</label>
                                    <input type="text" name="instrumentBeneficiary" placeholder="Beneficiary name" onChange={handleFormChange} />
                                </div>
                                <button type="submit" className="btn-primary w-full py-3 rounded-full text-white font-semibold text-sm">
                                    <span>Request Instrument</span>
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Loan Modal */}
                    <div className={`modal-overlay ${modalOpen === 'loan' ? 'open' : ''}`} onClick={closeModal}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-white font-bold text-lg">💰 Apply for Loan</h3>
                                <button onClick={closeModal} className="text-white/30 hover:text-white">
                                    <Icons.X className="w-5 h-5" />
                                </button>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault();
                                closeModal();
                                showToast('Loan application submitted!', '💰'); }}>
                                <div className="form-group">
                                    <label>Loan Amount (KES)</label>
                                    <input type="number" name="loanAmount" placeholder="e.g. 500000" onChange={handleFormChange} required />
                                </div>
                                <div className="form-group">
                                    <label>Term</label>
                                    <select name="loanTerm" onChange={handleFormChange} required>
                                        <option value="6 months">6 months</option>
                                        <option value="12 months">12 months</option>
                                        <option value="24 months">24 months</option>
                                        <option value="36 months">36 months</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Purpose</label>
                                    <select name="loanPurpose" onChange={handleFormChange}>
                                        <option value="business">Business Expansion</option>
                                        <option value="import">Import Financing</option>
                                        <option value="property">Property Purchase</option>
                                        <option value="personal">Personal</option>
                                    </select>
                                </div>
                                <button type="submit" className="btn-primary w-full py-3 rounded-full text-white font-semibold text-sm">
                                    <span>Apply for Loan</span>
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Insurance Modal */}
                    <div className={`modal-overlay ${modalOpen === 'insurance' ? 'open' : ''}`} onClick={closeModal}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-white font-bold text-lg">🛡️ Import Insurance</h3>
                                <button onClick={closeModal} className="text-white/30 hover:text-white">
                                    <Icons.X className="w-5 h-5" />
                                </button>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault();
                                closeModal();
                                showToast('Insurance request submitted!', '🛡️'); }}>
                                <div className="form-group">
                                    <label>Shipment Value (USD)</label>
                                    <input type="number" name="insuranceValue" placeholder="e.g. 25000" onChange={handleFormChange} required />
                                </div>
                                <div className="form-group">
                                    <label>Coverage Type</label>
                                    <select name="insuranceType" onChange={handleFormChange} required>
                                        <option value="all-risk">All Risk</option>
                                        <option value="theft">Theft & Pilferage</option>
                                        <option value="damage">Damage & Breakage</option>
                                        <option value="total-loss">Total Loss Only</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Shipping Origin</label>
                                    <input type="text" name="insuranceOrigin" placeholder="e.g. China, Turkey, Germany" onChange={handleFormChange} />
                                </div>
                                <button type="submit" className="btn-primary w-full py-3 rounded-full text-white font-semibold text-sm">
                                    <span>Request Insurance</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Render ──────────────────────────────────────────────────────────
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            console.error('React error:', e);
            document.getElementById('loading-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
